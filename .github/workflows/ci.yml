name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.20'
      - name: shellcheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: .
      - name: Build
        run: make build
      - name: Run Tests
        run: make test

